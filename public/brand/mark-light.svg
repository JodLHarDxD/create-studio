<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="CREATstudio mark (light surface)">
  <title>CREATstudio</title>
  <defs>
    <radialGradient id="cs-obsidian-l" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#3f3f46" />
      <stop offset="35%"  stop-color="#27272a" />
      <stop offset="70%"  stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
    <radialGradient id="cs-rim-l" cx="30%" cy="22%" r="40%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cs-emerald-l" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0" />
      <stop offset="85%"  stop-color="#34d399" stop-opacity="0" />
      <stop offset="92%"  stop-color="#34d399" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
    <filter id="cs-glow-l" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <circle cx="64" cy="64" r="60" fill="url(#cs-emerald-l)" filter="url(#cs-glow-l)" />
  <circle cx="64" cy="64" r="54" fill="url(#cs-obsidian-l)" />
  <circle cx="64" cy="64" r="54" fill="url(#cs-rim-l)" />
  <circle cx="64" cy="64" r="54" fill="none" stroke="rgba(9,9,11,0.18)" stroke-width="1" />

  <text
    x="64" y="84"
    text-anchor="middle"
    font-family="'Playfair Display', 'Iowan Old Style', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="64"
    fill="#34d399"
    style="letter-spacing:-0.04em; mix-blend-mode: screen;"
  >c</text>
</svg>
