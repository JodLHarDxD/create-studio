<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" width="360" height="260" role="img" aria-label="CREATstudio">
  <title>CREATstudio</title>
  <defs>
    <radialGradient id="ls-obsidian" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="35%" stop-color="#18181b" />
      <stop offset="70%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <radialGradient id="ls-rim" cx="30%" cy="22%" r="40%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="ls-emerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0" />
      <stop offset="85%"  stop-color="#34d399" stop-opacity="0" />
      <stop offset="92%"  stop-color="#34d399" stop-opacity="0.40" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="ls-violet" cx="72%" cy="78%" r="35%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <filter id="ls-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" />
    </filter>
  </defs>

  <!-- Mark, centered top -->
  <g transform="translate(116, 0)">
    <circle cx="64" cy="64" r="60" fill="url(#ls-emerald)" filter="url(#ls-glow)" />
    <circle cx="64" cy="64" r="54" fill="url(#ls-obsidian)" />
    <circle cx="64" cy="64" r="54" fill="url(#ls-violet)" />
    <circle cx="64" cy="64" r="54" fill="url(#ls-rim)" />
    <circle cx="64" cy="64" r="54" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <text
      x="64" y="84"
      text-anchor="middle"
      font-family="'Playfair Display', 'Iowan Old Style', Georgia, serif"
      font-style="italic"
      font-weight="400"
      font-size="64"
      fill="#34d399"
      style="letter-spacing:-0.04em; mix-blend-mode: screen;"
    >c</text>
  </g>

  <!-- Hairline divider -->
  <line x1="120" y1="148" x2="240" y2="148" stroke="rgba(255,255,255,0.10)" stroke-width="1" />

  <!-- Wordmark, centered bottom -->
  <g>
    <text
      x="180" y="226"
      text-anchor="middle"
      font-family="'Playfair Display', 'Iowan Old Style', Georgia, serif"
      font-style="italic"
      font-weight="400"
      font-size="68"
      fill="#f4f4f5"
      style="letter-spacing:-0.03em;"
    >creat</text>
    <text
      x="180" y="252"
      text-anchor="middle"
      font-family="'JetBrains Mono', ui-monospace, SFMono-Regular, monospace"
      font-weight="300"
      font-size="11"
      fill="#34d399"
      style="letter-spacing:0.25em; text-transform: uppercase;"
    >creatstudio</text>
  </g>
</svg>
