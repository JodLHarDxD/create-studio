<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="CREATstudio mark">
  <title>CREATstudio</title>
  <defs>
    <!-- Obsidian core: deep zinc-950 → black with off-center light bias -->
    <radialGradient id="cs-obsidian" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="35%" stop-color="#18181b" />
      <stop offset="70%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Specular rim highlight (upper-left) -->
    <radialGradient id="cs-rim" cx="30%" cy="22%" r="40%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <!-- Emerald glow ring -->
    <radialGradient id="cs-emerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0" />
      <stop offset="85%"  stop-color="#34d399" stop-opacity="0" />
      <stop offset="92%"  stop-color="#34d399" stop-opacity="0.40" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>

    <!-- Violet shadow accent (lower-right) -->
    <radialGradient id="cs-violet" cx="72%" cy="78%" r="35%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <filter id="cs-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" />
    </filter>
  </defs>

  <!-- Outer emerald glow halo -->
  <circle cx="64" cy="64" r="60" fill="url(#cs-emerald)" filter="url(#cs-glow)" />

  <!-- Obsidian body -->
  <circle cx="64" cy="64" r="54" fill="url(#cs-obsidian)" />

  <!-- Violet undertone -->
  <circle cx="64" cy="64" r="54" fill="url(#cs-violet)" />

  <!-- Specular highlight -->
  <circle cx="64" cy="64" r="54" fill="url(#cs-rim)" />

  <!-- Hairline contour for definition -->
  <circle cx="64" cy="64" r="54" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- Italic 'c' core glyph — embedded brand link -->
  <text
    x="64" y="84"
    text-anchor="middle"
    font-family="'Playfair Display', 'Iowan Old Style', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="64"
    fill="#34d399"
    style="letter-spacing:-0.04em; mix-blend-mode: screen;"
  >c</text>
</svg>
