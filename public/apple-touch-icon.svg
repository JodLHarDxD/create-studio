<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="CREATstudio">
  <defs>
    <radialGradient id="ai-obsidian" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#27272a" />
      <stop offset="35%" stop-color="#18181b" />
      <stop offset="70%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <radialGradient id="ai-rim" cx="30%" cy="22%" r="40%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="ai-emerald" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#34d399" stop-opacity="0" />
      <stop offset="80%"  stop-color="#34d399" stop-opacity="0" />
      <stop offset="92%"  stop-color="#34d399" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="ai-violet" cx="72%" cy="78%" r="35%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <filter id="ai-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" />
    </filter>
  </defs>

  <!-- iOS will round this; we paint full square -->
  <rect width="180" height="180" fill="#09090b" />

  <circle cx="90" cy="90" r="80" fill="url(#ai-emerald)" filter="url(#ai-glow)" />
  <circle cx="90" cy="90" r="72" fill="url(#ai-obsidian)" />
  <circle cx="90" cy="90" r="72" fill="url(#ai-violet)" />
  <circle cx="90" cy="90" r="72" fill="url(#ai-rim)" />
  <circle cx="90" cy="90" r="72" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.2" />

  <text
    x="90" y="116"
    text-anchor="middle"
    font-family="'Playfair Display', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="84"
    fill="#34d399"
    style="letter-spacing:-0.04em; mix-blend-mode: screen;"
  >c</text>
</svg>
